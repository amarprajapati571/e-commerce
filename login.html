<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ShopVibe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Logo -->
      <div class="text-center mb-4">
        <a href="index.html" class="auth-logo">Shop<span>Vibe</span></a>
      </div>

      <h4 class="auth-title text-center">Welcome Back</h4>
      <p class="auth-subtitle text-center">Sign in to continue shopping</p>

      <!-- Login Form -->
      <form>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" placeholder="Enter your email">
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Enter your password">
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label small text-muted" for="remember">Remember me</label>
          </div>
          <a href="#" class="small">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
      </form>

      <!-- Divider -->
      <div class="divider">or continue with</div>

      <!-- Social Login -->
      <div class="d-flex gap-3 mb-4">
        <a href="#" class="social-btn">
          <i class="bi bi-google"></i> Google
        </a>
        <a href="#" class="social-btn">
          <i class="bi bi-apple"></i> Apple
        </a>
      </div>

      <!-- Sign Up Link -->
      <p class="text-center mb-0 small text-muted">
        Don't have an account? <a href="signup.html" class="fw-semibold">Create Account</a>
      </p>
    </div>
  </div>
</body>
</html>
