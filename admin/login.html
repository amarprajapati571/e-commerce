<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - ShopVibe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/admin.css" rel="stylesheet">
</head>
<body>

  <div class="admin-login-wrapper">
    <div class="admin-login-card">

      <div class="login-logo">
        <h2>Shop<span>Vibe</span></h2>
        <p>Admin Panel Login</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div style="position:relative;">
            <i class="bi bi-envelope" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray-400);"></i>
            <input type="email" class="form-control" style="padding-left:40px;" placeholder="admin@shopvibe.com" required>
          </div>
        </div>

        <div class="form-group">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0">Password</label>
            <a href="#" style="font-size:0.8rem;">Forgot Password?</a>
          </div>
          <div style="position:relative;">
            <i class="bi bi-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray-400);"></i>
            <input type="password" class="form-control" style="padding-left:40px;" placeholder="Enter your password" id="passwordInput" required>
            <button type="button" id="togglePassword" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-400);cursor:pointer;">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe" style="font-size:0.85rem;color:var(--gray-600);">
              Remember me
            </label>
          </div>
        </div>

        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
        </button>
      </form>

      <div class="login-footer">
        <a href="../index.html"><i class="bi bi-arrow-left me-1"></i> Back to Store</a>
      </div>

    </div>
  </div>

  <script>
    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('passwordInput');

    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.querySelector('i').classList.toggle('bi-eye');
      this.querySelector('i').classList.toggle('bi-eye-slash');
    });

    // Form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
