<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP - ShopVibe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card text-center">
      <!-- Logo -->
      <div class="mb-4">
        <a href="index.html" class="auth-logo">Shop<span>Vibe</span></a>
      </div>

      <!-- Icon -->
      <div class="mx-auto mb-3 otp-icon">
        <i class="bi bi-shield-lock"></i>
      </div>

      <h4 class="auth-title">Verify Your Email</h4>
      <p class="auth-subtitle">We've sent a 6-digit verification code to<br><strong class="text-dark">john@example.com</strong></p>

      <!-- OTP Form -->
      <form>
        <div class="otp-inputs">
          <input type="text" class="form-control" maxlength="1" value="4">
          <input type="text" class="form-control" maxlength="1" value="8">
          <input type="text" class="form-control" maxlength="1" value="">
          <input type="text" class="form-control" maxlength="1" value="">
          <input type="text" class="form-control" maxlength="1" value="">
          <input type="text" class="form-control" maxlength="1" value="">
        </div>

        <button type="submit" class="btn btn-primary btn-lg mb-3">Verify Code</button>
      </form>

      <p class="small text-muted mb-2">Didn't receive the code?</p>
      <a href="#" class="small fw-semibold">Resend Code</a>
      <span class="small text-muted mx-2">|</span>
      <a href="#" class="small fw-semibold">Change Email</a>

      <div class="mt-4 p-3 rounded-3 bg-gray-50">
        <p class="small text-muted mb-0">
          <i class="bi bi-info-circle me-1"></i>
          Code expires in <strong class="text-dark">04:32</strong>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
