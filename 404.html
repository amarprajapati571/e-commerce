<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - ShopVibe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">Shop<span>Vibe</span></a>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav align-items-center gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i> Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html"><i class="bi bi-grid me-1"></i> Categories</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 404 PAGE -->
  <section class="error-page">
    <div class="container">
      <div class="error-code">404</div>
      <h2 class="fw-bold mt-3 mb-3">Oops! Page Not Found</h2>
      <p class="text-muted mb-4 mw-460-center">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a href="index.html" class="btn btn-primary btn-lg"><i class="bi bi-house me-2"></i>Go Home</a>
        <a href="products.html" class="btn btn-outline-primary btn-lg"><i class="bi bi-grid me-2"></i>Browse Products</a>
      </div>
      <div class="mt-5">
        <p class="text-muted small mb-2">Or try searching for what you need:</p>
        <div class="search-bar mx-auto search-bar-block">
          <i class="bi bi-search search-icon"></i>
          <input type="text" class="form-control form-control-lg" placeholder="Search products...">
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
