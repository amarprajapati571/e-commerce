<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - ShopVibe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Logo -->
      <div class="text-center mb-4">
        <a href="index.html" class="auth-logo">Shop<span>Vibe</span></a>
      </div>

      <h4 class="auth-title text-center">Create Account</h4>
      <p class="auth-subtitle text-center">Join us and start shopping today</p>

      <!-- Sign Up Form -->
      <form>
        <div class="row">
          <div class="col-6 mb-3">
            <label for="firstName" class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" placeholder="John">
          </div>
          <div class="col-6 mb-3">
            <label for="lastName" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" placeholder="Doe">
          </div>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" placeholder="john@example.com">
          </div>
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label">Phone Number</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-phone"></i></span>
            <input type="tel" class="form-control" id="phone" placeholder="+1 (555) 000-0000">
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Create a strong password">
          </div>
          <div class="form-text">Must be at least 8 characters with uppercase, number & symbol</div>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password">
          </div>
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="terms">
          <label class="form-check-label small text-muted" for="terms">
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
      </form>

      <!-- Divider -->
      <div class="divider">or sign up with</div>

      <!-- Social Sign Up -->
      <div class="d-flex gap-3 mb-4">
        <a href="#" class="social-btn">
          <i class="bi bi-google"></i> Google
        </a>
        <a href="#" class="social-btn">
          <i class="bi bi-apple"></i> Apple
        </a>
      </div>

      <!-- Login Link -->
      <p class="text-center mb-0 small text-muted">
        Already have an account? <a href="login.html" class="fw-semibold">Sign In</a>
      </p>
    </div>
  </div>
</body>
</html>
